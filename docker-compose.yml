version: '3.8'

services:
  minio:
    image: minio/minio:RELEASE.2024-03-30T09-41-56Z
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - ./data/minio:/data
    networks:
      - mlops-net

  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set myminio http://minio:9000 minioadmin minioadmin;
      mc mb myminio/mlops-data || true;
      mc mb myminio/warehouse || true;
      mc mb myminio/landing-zone || true;
      mc mb myminio/raw || true;
      mc mb myminio/mlflow-artifacts || true;
      mc mb myminio/airflow-logs || true;
      exit 0;
      "
    networks:
      - mlops-net

  postgres:
    image: postgres:15-alpine
    container_name: postgres-metastore
    environment:
      - POSTGRES_USER=hive
      - POSTGRES_PASSWORD=hive
      - POSTGRES_DB=metastore
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - mlops-net

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.11.3
    container_name: mlflow-server
    ports:
      - "5000:5000"
    environment:
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
      - AWS_REGION=us-east-1
      - MLFLOW_S3_ENDPOINT_URL=http://minio:9000
    command: >
      mlflow server
      --backend-store-uri postgresql://hive:hive@postgres:5432/metastore
      --default-artifact-root s3://mlflow-artifacts/
      --host 0.0.0.0
    depends_on:
      - postgres
      - minio
    networks:
      - mlops-net

  trino:
    image: trinodb/trino:443
    container_name: trino
    depends_on:
      - postgres
      - minio
    ports:
      - "8081:8080"
    volumes:
      - ./trino/etc:/etc/trino
    networks:
      - mlops-net

  jupyterlab:
    build:
      context: ./jupyter
    container_name: jupyterlab
    ports:
      - "8888:8888"
    command: start-notebook.sh --ServerApp.token='' --ServerApp.password=''
    environment:
      - JUPYTER_ENABLE_LAB=yes
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
      - AWS_S3_ENDPOINT=http://minio:9000
    volumes:
      - ./jupyter/notebooks:/home/jovyan/work
    networks:
      - mlops-net
    depends_on:
      - minio
      - trino

networks:
  mlops-net:
    driver: bridge
