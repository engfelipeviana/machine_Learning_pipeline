version: '3.8'

services:
  minio:
    image: minio/minio:RELEASE.2024-03-30T09-41-56Z
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - ./data/minio:/data
    networks:
      - mlops-net

  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set myminio http://minio:9000 minioadmin minioadmin;
      mc mb myminio/mlops-data || true;
      mc mb myminio/warehouse || true;
      exit 0;
      "
    networks:
      - mlops-net

  postgres:
    image: postgres:15-alpine
    container_name: postgres-metastore
    environment:
      - POSTGRES_USER=hive
      - POSTGRES_PASSWORD=hive
      - POSTGRES_DB=metastore
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    networks:
      - mlops-net

  trino:
    image: trinodb/trino:443
    container_name: trino
    depends_on:
      - postgres
      - minio
    ports:
      - "8081:8080"
    volumes:
      - ./trino/etc:/etc/trino
    networks:
      - mlops-net

  jupyterlab:
    build:
      context: ./jupyter
    container_name: jupyterlab
    ports:
      - "8888:8888"
    environment:
      - JUPYTER_ENABLE_LAB=yes
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
      - AWS_S3_ENDPOINT=http://minio:9000
    volumes:
      - ./jupyter/notebooks:/home/jovyan/work
    networks:
      - mlops-net
    depends_on:
      - minio
      - trino

networks:
  mlops-net:
    driver: bridge
