# ============================================================
# ML Pipeline Contract — Insurance Regression
# ============================================================

metadata:
  name: insurance_regression_v1
  version: "1.0.0"
  description: Previsao do custo de seguro de saude com base em dados demograficos e comportamentais
  owner: squad-data
  tags: [insurance, regression, charges]
  created_at: "2026-04-18"

problem:
  type: regression
  objective: minimize
  target_metric: rmse

data:
  source: s3
  bucket: landing-zone
  file_name: insurance.csv
  splits:
    train: 0.80
    test: 0.20
  split_strategy: random

label:
  column: charges

features:
  - name: age
    dtype: int
    transformations: [standard_scaler]
    missing_strategy: median

  - name: bmi
    dtype: float
    transformations: [standard_scaler]
    missing_strategy: median

  - name: children
    dtype: int
    transformations: []
    missing_strategy: most_frequent

  - name: sex
    dtype: categorical
    encoding: label
    mapping:
      female: 0
      male: 1
    missing_strategy: most_frequent

  - name: smoker
    dtype: categorical
    encoding: label
    mapping:
      no: 0
      yes: 1
    missing_strategy: most_frequent

  - name: region
    dtype: categorical
    encoding: onehot
    drop_first: true
    missing_strategy: most_frequent

model:
  algorithm: linear_regression
  framework: sklearn_api
  hyperparameters:
    fit_intercept: true
  training:
    eval_metric: rmse